<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizzeria výhovorky</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFE000;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
    }

    .pizza-btn {
      width: 180px;
      height: 180px;
      border: none;
      border-radius: 50%;
      font-size: 90px;
      cursor: pointer;
      background: #fff3c4;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .pizza-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .pizza-btn:active {
      transform: scale(0.97);
    }

    h1 {
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 32px;
      color: #222;
      background: #FFE000;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 10px;
    }

    p {
      color: #333;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .excuse-box {
      margin-top: 30px;
      padding: 22px;
      min-height: 90px;
      background: rgba(255, 255, 255, 0.65);
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      font-size: 24px;
      font-weight: bold;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 12px;
    }

    @media (max-width: 600px) {
      .pizza-btn {
        width: 140px;
        height: 140px;
        font-size: 70px;
      }

      h1 {
        font-size: 26px;
      }

      .excuse-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="pizza-btn" id="pizzaBtn" aria-label="Pizza">🍕</button>
    <h1>Klikni na pizzu</h1>
    <p>A dostaneš dôvod, prečo dnes ešte nezačať podnikať s pizzériou.</p>

    <div class="excuse-box" id="excuseBox">
      Zatiaľ nič. Pizza ešte nerozhodla.
    </div>

    <div class="hint">Každý klik = nová výhovorka</div>
  </div>

  <script>
    const excuses = [
      "Najprv si musíš spraviť logo, bez toho sa pizza piecť nedá.",
      "Trh ešte nie je pripravený na tvoju geniálnu Margheritu.",
      "Najskôr potrebuješ 4 mesiace skúmať, aký odtieň červenej má mať krabica.",
      "Bez pece za 12-tisíc eur by to vraj nemalo zmysel.",
      "Najprv musíš ochutnať pizzu v Neapole, inak by to nebolo autentické.",
      "Ešte nemáš dokonale premyslený názov podniku, tak radšej nič nezačínaj.",
      "Musíš si najprv pozrieť aspoň 37 videí o ceste na dokonalé cesto.",
      "Dnes nie, lebo pondelok nie je energia na veľké biznis rozhodnutia.",
      "Najprv potrebuješ vlastnú appku, web, branding a merch. Potom možno jednu pizzu.",
      "Možno by bolo lepšie ešte rok rozmýšľať, či ľudia vôbec jedia syr."
    ];

    const pizzaBtn = document.getElementById("pizzaBtn");
    const excuseBox = document.getElementById("excuseBox");

    pizzaBtn.addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * excuses.length);
      excuseBox.textContent = excuses[randomIndex];
    });
  </script>
</body>
</html>
